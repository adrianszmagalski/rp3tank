# Raspberry Pi control server configuration
# Run from pi/: python -m src.main

camera:
  # Stream resolution; lower to 960x540 if CPU is high
  width: 960
  height: 540
  fps: 30
  # MJPEG hardware encoder quality (1-100)
  quality: 80

serial:
  # UART to Raspberry Pi Pico (enable serial in boot config)
  port: "/dev/serial0"
  baud: 115200
  # Retry interval when Pico is missing or disconnected
  reconnect_seconds: 3

server:
  host: "0.0.0.0"
  port: 8000

safety:
  # Send STOP to Pico if no control command within this window (ms)
  control_timeout_ms: 500
  # Pan/tilt limits (degrees) — protect camera ribbon cable
  pan_min: 10
  pan_max: 170
  tilt_min: 30
  tilt_max: 150
