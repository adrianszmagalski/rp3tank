<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RP3 Tank — sterowanie testowe</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 1rem;
      background: #1a1a2e;
      color: #eee;
    }
    h1 { font-size: 1.25rem; margin: 0 0 1rem; }
    .layout {
      display: grid;
      grid-template-columns: 1fr minmax(200px, 320px);
      gap: 1rem;
      max-width: 1100px;
    }
    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
    }
    .stream-wrap {
      background: #000;
      border-radius: 8px;
      overflow: hidden;
    }
    .stream-wrap img {
      display: block;
      width: 100%;
      height: auto;
      min-height: 200px;
      object-fit: contain;
    }
    .status {
      background: #16213e;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 1rem;
    }
    .status .ok { color: #4ade80; }
    .status .err { color: #f87171; }
    .controls { display: flex; flex-direction: column; gap: 1rem; }
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(3, 56px);
      gap: 4px;
      justify-content: center;
    }
    .dpad button {
      border: none;
      border-radius: 8px;
      background: #0f3460;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
    }
    .dpad button:active, .dpad button.active {
      background: #e94560;
    }
    .dpad .empty { visibility: hidden; pointer-events: none; }
    .sliders label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
    }
    .sliders input[type="range"] { width: 100%; }
    .btn-stop {
      width: 100%;
      padding: 1rem;
      font-size: 1.25rem;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      background: #dc2626;
      color: #fff;
      cursor: pointer;
    }
    .btn-stop:active { background: #991b1b; }
    .ws-state { font-size: 0.8rem; opacity: 0.8; }
  </style>
</head>
<body>
  <h1>RP3 Tank — panel testowy</h1>
  <div class="status" id="status">Ładowanie statusu…</div>
  <p class="ws-state">WebSocket: <span id="wsState">łączenie…</span></p>

  <div class="layout">
    <div class="stream-wrap">
      <img src="/stream.mjpg" alt="Podgląd kamery">
    </div>
    <div class="controls">
      <div class="dpad" id="dpad">
        <span class="empty"></span>
        <button type="button" data-l="0" data-r="100" title="przód">▲</button>
        <span class="empty"></span>
        <button type="button" data-l="-100" data-r="100" title="lewo-przód">◤</button>
        <button type="button" data-l="0" data-r="0" data-stop="1" title="STOP">■</button>
        <button type="button" data-l="100" data-r="-100" title="prawo-przód">◥</button>
        <button type="button" data-l="-100" data-r="-100" title="lewo">◀</button>
        <button type="button" data-l="-100" data-r="100" title="obrót w lewo">↺</button>
        <button type="button" data-l="100" data-r="100" title="prawo">▶</button>
        <button type="button" data-l="100" data-r="-100" title="tył-lewo">◣</button>
        <button type="button" data-l="0" data-r="0" data-back="1" title="tył">▼</button>
        <button type="button" data-l="-100" data-r="100" title="tył-prawo">◢</button>
      </div>
      <div class="sliders">
        <label>Pan: <span id="panVal">90</span>°
          <input type="range" id="pan" min="10" max="170" value="90">
        </label>
        <label>Tilt: <span id="tiltVal">90</span>°
          <input type="range" id="tilt" min="30" max="150" value="90">
        </label>
      </div>
      <button type="button" class="btn-stop" id="bigStop">STOP</button>
    </div>
  </div>

  <script>
    const WS_URL = `ws://${location.host}/ws/control`;
    let ws = null;
    let reconnectDelay = 1000;
    let driveTimer = null;
    let currentLeft = 0;
    let currentRight = 0;

    const wsStateEl = document.getElementById('wsState');
    const statusEl = document.getElementById('status');
    const panInput = document.getElementById('pan');
    const tiltInput = document.getElementById('tilt');
    const panVal = document.getElementById('panVal');
    const tiltVal = document.getElementById('tiltVal');

    function send(obj) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(obj));
      }
    }

    function sendStop() {
      send({ type: 'stop' });
      stopDriveInterval();
    }

    function sendDrive(left, right) {
      currentLeft = left;
      currentRight = right;
      send({ type: 'drive', left, right });
    }

    function startDriveInterval(left, right) {
      stopDriveInterval();
      sendDrive(left, right);
      driveTimer = setInterval(() => sendDrive(left, right), 100);
    }

    function stopDriveInterval() {
      if (driveTimer) {
        clearInterval(driveTimer);
        driveTimer = null;
      }
    }

    function sendCam() {
      const pan = parseInt(panInput.value, 10);
      const tilt = parseInt(tiltInput.value, 10);
      send({ type: 'cam', pan, tilt });
    }

    function connectWs() {
      ws = new WebSocket(WS_URL);
      wsStateEl.textContent = 'łączenie…';

      ws.onopen = () => {
        wsStateEl.textContent = 'połączono';
        reconnectDelay = 1000;
      };

      ws.onclose = () => {
        wsStateEl.textContent = 'rozłączono — ponawiam…';
        stopDriveInterval();
        setTimeout(connectWs, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 1.5, 3000);
      };

      ws.onerror = () => {
        wsStateEl.textContent = 'błąd';
      };
    }

  connectWs();

    document.querySelectorAll('#dpad button').forEach((btn) => {
      const onDown = (e) => {
        e.preventDefault();
        btn.classList.add('active');
        if (btn.dataset.stop === '1' || (btn.dataset.l === '0' && btn.dataset.r === '0' && !btn.dataset.back)) {
          sendStop();
          return;
        }
        if (btn.dataset.back === '1') {
          startDriveInterval(0, -100);
          return;
        }
        const left = parseInt(btn.dataset.l, 10);
        const right = parseInt(btn.dataset.r, 10);
        startDriveInterval(left, right);
      };
      const onUp = () => {
        btn.classList.remove('active');
        sendStop();
      };
      btn.addEventListener('pointerdown', onDown);
      btn.addEventListener('pointerup', onUp);
      btn.addEventListener('pointerleave', onUp);
      btn.addEventListener('pointercancel', onUp);
    });

    panInput.addEventListener('input', () => {
      panVal.textContent = panInput.value;
      sendCam();
    });
    tiltInput.addEventListener('input', () => {
      tiltVal.textContent = tiltInput.value;
      sendCam();
    });

    document.getElementById('bigStop').addEventListener('click', sendStop);

    async function pollStatus() {
      try {
        const r = await fetch('/status');
        const d = await r.json();
        const pico = d.pico_connected
          ? '<span class="ok">Pico: połączony</span>'
          : '<span class="err">Pico: brak</span>';
        const batt = d.batt_v != null ? `${d.batt_v.toFixed(2)} V` : '—';
        const dist = d.dist_cm != null ? `${d.dist_cm} cm` : '—';
        statusEl.innerHTML =
          `${pico}<br>` +
          `Uptime: ${d.uptime_s} s · Tryb: <strong>${d.mode}</strong><br>` +
          `Bateria: ${batt} · Dystans: ${dist}`;
      } catch {
        statusEl.innerHTML = '<span class="err">Status niedostępny</span>';
      }
    }

    pollStatus();
    setInterval(pollStatus, 1000);
  </script>
</body>
</html>
