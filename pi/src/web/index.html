<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RP3 Tank Control</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 1rem;
      background: #1a1a1a;
      color: #eee;
    }
    h1 { font-size: 1.2rem; margin: 0 0 1rem; }
    .layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 1rem;
      max-width: 1100px;
    }
    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
    }
    .video-wrap {
      background: #000;
      border-radius: 8px;
      overflow: hidden;
    }
    .video-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }
    .panel { display: flex; flex-direction: column; gap: 1rem; }
    .status {
      background: #2a2a2a;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.6;
    }
    .status .ok { color: #6f6; }
    .status .warn { color: #fa0; }
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(3, 56px);
      gap: 4px;
      justify-content: center;
    }
    .dpad button {
      width: 56px;
      height: 56px;
      font-size: 1.2rem;
      border: none;
      border-radius: 8px;
      background: #444;
      color: #fff;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
    }
    .dpad button:active, .dpad button.active { background: #06a; }
    .dpad .empty { visibility: hidden; }
    .stop-btn {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: bold;
      background: #c33;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .sliders label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }
    .sliders input[type=range] { width: 100%; }
    #wsState { font-size: 0.8rem; color: #888; }
  </style>
</head>
<body>
  <h1>RP3 Tank — test control</h1>
  <div class="layout">
    <div class="video-wrap">
      <img src="/stream.mjpg" alt="Camera stream">
    </div>
    <div class="panel">
      <div class="status" id="statusBox">Loading status…</div>
      <p id="wsState">WebSocket: connecting…</p>

      <div class="dpad" id="dpad">
        <span class="empty"></span>
        <button type="button" data-drive="0,100">▲</button>
        <span class="empty"></span>
        <button type="button" data-drive="-100,100">◀</button>
        <button type="button" data-drive="0,0" id="centerBtn">●</button>
        <button type="button" data-drive="100,100">▶</button>
        <button type="button" data-drive="-100,-100">↙</button>
        <button type="button" data-drive="0,-100">▼</button>
        <button type="button" data-drive="100,-100">↘</button>
      </div>

      <button type="button" class="stop-btn" id="stopBtn">STOP</button>

      <div class="sliders">
        <label>Pan <span id="panVal">90</span>°
          <input type="range" id="pan" min="10" max="170" value="90">
        </label>
        <label>Tilt <span id="tiltVal">90</span>°
          <input type="range" id="tilt" min="30" max="150" value="90">
        </label>
      </div>
    </div>
  </div>

  <script>
    const wsProto = location.protocol === "https:" ? "wss:" : "ws:";
    let ws = null;
    let driveInterval = null;
    let currentDrive = null;

    function connectWs() {
      ws = new WebSocket(`${wsProto}//${location.host}/ws/control`);
      ws.onopen = () => {
        document.getElementById("wsState").textContent = "WebSocket: connected";
      };
      ws.onclose = () => {
        document.getElementById("wsState").textContent = "WebSocket: disconnected — retrying…";
        setTimeout(connectWs, 2000);
      };
      ws.onerror = () => {
        document.getElementById("wsState").textContent = "WebSocket: error";
      };
    }
    connectWs();

    function send(obj) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(obj));
      }
    }

    function sendStop() {
      send({ type: "stop" });
      stopDriveInterval();
    }

    function stopDriveInterval() {
      if (driveInterval) {
        clearInterval(driveInterval);
        driveInterval = null;
      }
      currentDrive = null;
      document.querySelectorAll(".dpad button").forEach(b => b.classList.remove("active"));
    }

    function startDrive(left, right) {
      const key = `${left},${right}`;
      if (currentDrive === key && driveInterval) return;
      stopDriveInterval();
      currentDrive = key;
      const payload = { type: "drive", left, right };
      send(payload);
      driveInterval = setInterval(() => send(payload), 100);
    }

    document.getElementById("dpad").addEventListener("mousedown", onDriveStart);
    document.getElementById("dpad").addEventListener("touchstart", onDriveStart, { passive: false });
    document.addEventListener("mouseup", onDriveEnd);
    document.addEventListener("touchend", onDriveEnd);
    document.addEventListener("touchcancel", onDriveEnd);

    function onDriveStart(e) {
      const btn = e.target.closest("button[data-drive]");
      if (!btn) return;
      e.preventDefault();
      btn.classList.add("active");
      const [left, right] = btn.dataset.drive.split(",").map(Number);
      if (left === 0 && right === 0) {
        sendStop();
        return;
      }
      startDrive(left, right);
    }

    function onDriveEnd() {
      sendStop();
    }

    document.getElementById("stopBtn").addEventListener("click", sendStop);

    const panEl = document.getElementById("pan");
    const tiltEl = document.getElementById("tilt");
    function sendCam() {
      const pan = parseInt(panEl.value, 10);
      const tilt = parseInt(tiltEl.value, 10);
      document.getElementById("panVal").textContent = pan;
      document.getElementById("tiltVal").textContent = tilt;
      send({ type: "cam", pan, tilt });
    }
    panEl.addEventListener("input", sendCam);
    tiltEl.addEventListener("input", sendCam);

    async function pollStatus() {
      try {
        const r = await fetch("/status");
        const s = await r.json();
        const conn = s.pico_connected
          ? '<span class="ok">Pico: connected</span>'
          : '<span class="warn">Pico: disconnected</span>';
        const batt = s.batt_v != null ? s.batt_v.toFixed(2) + " V" : "—";
        const dist = s.dist_cm != null ? s.dist_cm + " cm" : "—";
        document.getElementById("statusBox").innerHTML =
          `${conn}<br>` +
          `Uptime: ${s.uptime_s}s<br>` +
          `Battery: ${batt}<br>` +
          `Distance: ${dist}<br>` +
          `Mode: ${s.mode}`;
      } catch (e) {
        document.getElementById("statusBox").textContent = "Status unavailable";
      }
    }
    setInterval(pollStatus, 1000);
    pollStatus();
  </script>
</body>
</html>
